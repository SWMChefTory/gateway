upstream proxy-server {
    server proxy-server:8080;
}

upstream ai-voice-command {
    server ai-voice-command:8000;
}

geoip2 /usr/share/GeoIP/GeoLite2-Country.mmdb {
    $geo_country_code country iso_code;
}

log_format main_ext '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'country=$geo_country_code';

access_log /dev/stdout main_ext;
error_log  /dev/stderr warn;

server {
    listen 80;
    server_name dev.api.cheftories.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location /api {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name dev.api.cheftories.com;

    ssl_certificate /etc/letsencrypt/live/dev.api.cheftories.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.api.cheftories.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Country-Code $geo_country_code;

    location = /api/v1/voice-command/ws {
        proxy_pass http://ai-voice-command/api/v1/voice-command/ws;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Country-Code $geo_country_code;
    }

    location / {
        proxy_pass http://proxy-server/;
    }
}